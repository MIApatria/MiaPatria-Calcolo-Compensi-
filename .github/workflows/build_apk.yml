name: Build Android APK (Busta Paga CIRFOOD)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'busta_paga_app/**'
      - '.github/workflows/build_apk.yml'

defaults:
  run:
    working-directory: busta_paga_app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Generate Android platform scaffold
        run: flutter create --platforms=android --org com.miapatria --project-name busta_paga_cirfood .

      - name: Add camera permission and app label to AndroidManifest.xml
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.CAMERA' "$MANIFEST" || \
            sed -i 's#<manifest xmlns:android="http://schemas.android.com/apk/res/android">#<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.CAMERA"/>#' "$MANIFEST"
          sed -i 's/android:label="[^"]*"/android:label="Busta Paga CIRFOOD"/' "$MANIFEST"
          cat "$MANIFEST"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: busta-paga-cirfood-apk
          path: busta_paga_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
